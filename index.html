 <!DOCTYPE html>
<html lang="ar" dir="rtl">

<input id="principal" placeholder="المديرة">
<input id="subject" placeholder="المادة">

<div id="skills"></div>
</div>
</div>

<!-- الفصول -->
<div id="classes" class="section">
<input id="className">
<button onclick="addClass()">إضافة</button>
<div id="classList"></div>
</div>

<!-- الطالبات -->
<div id="students" class="section">
<textarea id="studentsText"></textarea>

<!-- الدرجات -->

<input id="exam" placeholder="60">

</div>

<!-- التحليل -->
<div id="analysis" class="section">
<div id="analysisBox"></div>
<canvas id="chart"></canvas>
</div>

<!-- الخطط -->
<div id="plans" class="section">
<div id="planBox"></div>
</div>

<!-- التقارير -->
<div id="report" class="section">
<div id="reportContent"></div>
<button onclick="generateReport()">تحديث</button>
<button onclick="window.print()">طباعة</button>
</div>

<!-- التكريم -->
<div id="honor" class="section">
<div id="honorList"></div>
</div>

<!-- الأرشيف -->
<div id="archive" class="section">
<button onclick="saveArchive()">حفظ</button>
<div id="archiveList"></div>
</div>

<!-- الألعاب -->
<div id="games" class="section">

</div>

<a href="https://noor.moe.gov.sa" target="_blank">نور</a><br>
<a href="https://schools.madrasati.sa" target="_blank">مدرستي</a>
</div>
